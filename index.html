<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F4EFE6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Greeting Prompt">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<title>Greeting Prompt</title>
<style>
  :root{
    --bg:linear-gradient(180deg,#081225 0%,#102542 55%,#0B1730 100%);
    --card:#FFFFFF;
    --ink:#2B2620;
    --muted:#9A9388;
    --line:#E9E2D5;
    --safe:#3E9B6B;
    --warn:#E0A93B;
    --over:#D15A43;
    --accent:var(--safe);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    position:relative;
    overflow-x:hidden;
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    line-height:1.5;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    padding:20px 16px calc(20px + env(safe-area-inset-bottom));
  }
  .wrap{width:100%;max-width:560px;display:flex;flex-direction:column;gap:14px;}

  header{display:flex;align-items:center;gap:12px;padding:0 2px;}
  .avatars{display:flex;align-items:center;}
  .mascot{
    width:44px;height:44px;border-radius:50%;
    object-fit:cover;object-position:50% 38%;
    border:2.5px solid var(--accent);
    background:#EFE8DB;
    box-shadow:0 0 0 2.5px var(--card), 0 3px 9px -4px rgba(43,38,32,.45);
    transition:border-color .25s ease;
  }
  .mascot + .mascot{margin-left:-11px;}
  .avatars.shake{animation:shake .45s cubic-bezier(.36,.07,.19,.97);}
  @keyframes shake{
    10%,90%{transform:translateX(-1px)}
    20%,80%{transform:translateX(2px)}
    30%,50%,70%{transform:translateX(-3px)}
    40%,60%{transform:translateX(3px)}
  }
  h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.01em;color:#FFFFFF;text-shadow:0 1px 8px rgba(255,255,255,.15);}

  .tabs{display:flex;gap:6px;padding:0 2px;}
  .tab{
    flex:1;position:relative;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    color:rgba(255,255,255,.78);
    border-radius:14px;
    padding:11px 0;
    font-size:15px;font-weight:800;
    font-variant-numeric:tabular-nums;
    transition:background .18s ease, color .18s ease, border-color .18s ease;
  }
  .tab.active{background:rgba(255,255,255,.94);color:#102542;border-color:rgba(255,255,255,.95);}
  .tab.has::after{
    content:"";position:absolute;top:7px;right:9px;
    width:5px;height:5px;border-radius:99px;background:var(--safe);
  }
  .tab.active.has::after{background:#FFF8E1;}

  /* 게이지: 타코야키 한 알이 스으윽 */
  .meter{display:flex;align-items:center;gap:12px;padding:0 4px;}
  .track{position:relative;flex:1;height:30px;display:flex;align-items:center;}
  .rail{position:relative;width:100%;height:8px;border-radius:99px;background:var(--line);}
  .trail{
    position:absolute;left:0;top:0;height:100%;width:15px;
    border-radius:99px;background:var(--accent);
    transition:width .3s cubic-bezier(.22,.61,.36,1), background .25s ease;
  }
  .tako-ball{
    position:absolute;top:50%;left:0;width:30px;
    transform:translateY(-50%);
    transition:left .3s cubic-bezier(.22,.61,.36,1);
    filter:drop-shadow(0 2px 3px rgba(43,38,32,.4));
  }
  .tako-ball img{display:block;width:100%;height:auto;}
  .count{
    font-variant-numeric:tabular-nums;
    font-feature-settings:"tnum";
    font-weight:800;
    font-size:16px;
    letter-spacing:-.01em;
    white-space:nowrap;
  }
  .count .cur{
    color:var(--accent);
    transition:color .25s ease;
    display:inline-block;
    min-width:3ch;
    text-align:right;
  }
  .count .max{color:var(--muted);font-weight:700;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:6px;
    box-shadow:0 1px 0 rgba(43,38,32,.03), 0 12px 30px -22px rgba(43,38,32,.35);
  }
  textarea{
    width:100%;
    border:0;
    outline:0;
    resize:none;
    background:transparent;
    color:var(--ink);
    font:inherit;
    font-size:16px;
    line-height:1.6;
    padding:16px;
    min-height:460px;
    border-radius:18px;
  }
  textarea::placeholder{color:#C2BBAD;}

  .actions{display:flex;gap:10px;}
  button{
    font:inherit;font-weight:800;
    border:0;border-radius:16px;
    padding:15px 16px;
    cursor:pointer;
    transition:transform .06s ease, opacity .2s ease, background .2s ease;
  }
  button:active{transform:scale(.985);}
  .copy{flex:1;background:linear-gradient(180deg,#4F8CFF 0%,#2D6BFF 100%);color:#FFFFFF;font-size:16px;box-shadow:0 8px 20px rgba(45,107,255,.35);}
  .copy.done{background:var(--safe);}
  .clear{background:rgba(255,255,255,.08);color:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.18);padding-left:18px;padding-right:18px;backdrop-filter:blur(4px);}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;} .tako-pop{display:none!important;}}
  button:focus-visible{outline:2px solid var(--ink);outline-offset:2px;}

  .overlay{
    position:fixed;inset:0;
    background:rgba(43,38,32,.45);
    display:none;align-items:center;justify-content:center;
    padding:24px;z-index:10;
  }
  .overlay.show{display:flex;}
  .dialog{
    background:var(--card);
    border-radius:22px;
    padding:24px 22px 18px;
    width:100%;max-width:320px;
    box-shadow:0 24px 60px -20px rgba(43,38,32,.5);
    text-align:center;
  }
  .dialog p{margin:0 0 20px;font-size:16px;font-weight:700;line-height:1.5;}
  .dialog .row{display:flex;gap:10px;}
  .dialog button{flex:1;font-size:15px;}
  .btn-no{background:#EFE8DB;color:var(--ink);}
  .btn-yes{background:var(--over);color:#FFF3E9;}

  /* 글자 입력 시 타코야키가 살짝 팡팡 튀는 효과 */
  .tako-pop{
    position:fixed;
    width:21px;
    height:21px;
    pointer-events:none;
    z-index:20;
    opacity:0;
    transform:translate(-50%,-50%) scale(.65) rotate(0deg);
    animation:takoPop .62s cubic-bezier(.18,.76,.36,1) forwards;
    filter:drop-shadow(0 2px 3px rgba(43,38,32,.28));
    will-change:transform, opacity;
  }
  .tako-pop img{display:block;width:100%;height:100%;object-fit:contain;}
  @keyframes takoPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.55) rotate(0deg);}
    12%{opacity:1;}
    100%{opacity:0;transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.05) rotate(var(--rot));}
  }

  /* 겨울밤 눈 효과 */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,.18) 0 2px, transparent 3px),
      radial-gradient(circle at 80% 15%, rgba(255,255,255,.12) 0 1px, transparent 2px),
      radial-gradient(circle at 70% 35%, rgba(255,255,255,.10) 0 2px, transparent 3px);
    z-index:0;
  }

  .wrap{position:relative;z-index:2;}

  .snowflake{
    position:fixed;
    top:-20px;
    color:rgba(255,255,255,.5);
    pointer-events:none;
    z-index:1;
    text-shadow:0 0 4px rgba(255,255,255,.15);
    animation:snowFall linear forwards;
  }

  @keyframes snowFall{
    from{
      transform:translateY(0) translateX(0);
      opacity:.5;
    }
    to{
      transform:translateY(calc(100vh + 40px)) translateX(var(--drift));
      opacity:.15;
    }
  }


  /* 타코야키 글로우 */
  .tako-ball{
    filter:
      drop-shadow(0 0 6px rgba(255,170,70,.45))
      drop-shadow(0 0 14px rgba(255,140,30,.25))
      drop-shadow(0 2px 3px rgba(43,38,32,.4));
  }

  .trail{
    box-shadow:
      0 0 8px rgba(255,170,70,.35),
      0 0 18px rgba(255,140,30,.18);
  }

  </style>
</head>

  var LIMIT = 500;
  var PAGES = 3;
  var ta = document.getElementById('text');
  var cur = document.getElementById('cur');
  var trail = document.getElementById('trail');
  var taball = document.getElementById('taball');
  var copyBtn = document.getElementById('copy');
  var clearBtn = document.getElementById('clear');
  var tabBtns = Array.prototype.slice.call(document.querySelectorAll('.tab'));
  var root = document.documentElement;
  var avatars = document.getElementById('avatars');
  var mascotGirl = document.getElementById('mascotGirl');
  var mascotBoy = document.getElementById('mascotBoy');
  var takoImgSrc = taball.querySelector('img').src;
  var lastInputLength = 0;
  var lastPopTime = 0;

  var pages = [];
  for (var i = 0; i < PAGES; i++) pages.push('');
  var active = 0;
  var lastState = '';

  function renderTabs(){
    for (var i = 0; i < tabBtns.length; i++){
      tabBtns[i].classList.toggle('active', i === active);
      tabBtns[i].classList.toggle('has', pages[i].length > 0);
    }
  }

  function update(){
    pages[active] = ta.value;
    var n = ta.value.length;
    cur.textContent = n;

    var p = Math.min(n / LIMIT, 1);
    trail.style.width = 'calc(' + p + ' * (100% - 30px) + 15px)';
    taball.style.left = 'calc(' + p + ' * (100% - 30px))';

    var state = (n > LIMIT) ? 'over' : (n >= 450 ? 'warn' : 'safe');
    var color = (state === 'over') ? 'var(--over)' : (state === 'warn' ? 'var(--warn)' : 'var(--safe)');
    root.style.setProperty('--accent', color);

    if (state !== lastState){
      mascotGirl.src = (state === 'safe') ? GIRL_HAPPY : GIRL_POUT;
      mascotBoy.src  = (state === 'safe') ? BOY_HAPPY  : BOY_SERIOUS;
      if (state === 'over'){
        avatars.classList.remove('shake');
        void avatars.offsetWidth;
        avatars.classList.add('shake');
      } else {
        avatars.classList.remove('shake');
      }
      lastState = state;
    }
    renderTabs();
  }


  function popTakoyaki(amount){
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    var now = Date.now();
    if (now - lastPopTime < 42) return;
    lastPopTime = now;

    var rect = taball.getBoundingClientRect();
    var count = Math.min(Math.max(amount || 1, 1), 3);

    for (var i = 0; i < count; i++){
      var particle = document.createElement('span');
      var img = document.createElement('img');
      img.alt = '';
      img.src = takoImgSrc;
      particle.className = 'tako-pop';
      particle.appendChild(img);

      var startX = rect.left + rect.width / 2 + (Math.random() * 14 - 7);
      var startY = rect.top + rect.height / 2 + (Math.random() * 8 - 4);
      var tx = (Math.random() * 52 - 26).toFixed(1) + 'px';
      var ty = (-(36 + Math.random() * 42)).toFixed(1) + 'px';
      var rot = (Math.random() * 120 - 60).toFixed(1) + 'deg';

      particle.style.left = startX + 'px';
      particle.style.top = startY + 'px';
      particle.style.setProperty('--tx', tx);
      particle.style.setProperty('--ty', ty);
      particle.style.setProperty('--rot', rot);
      particle.style.animationDelay = (i * 35) + 'ms';

      document.body.appendChild(particle);
      (function(el){
        setTimeout(function(){ if (el && el.parentNode) el.parentNode.removeChild(el); }, 850);
      })(particle);
    }
  }

  function handleInput(){
    var n = ta.value.length;
    var added = Math.max(n - lastInputLength, 0);
    update();
    if (added > 0) popTakoyaki(added);
    lastInputLength = n;
  }

  function switchTo(i){
    if (i === active) return;
    pages[active] = ta.value;
    active = i;
    ta.value = pages[active];
    lastState = '';
    update();
    lastInputLength = ta.value.length;
    ta.focus();
  }

  ta.addEventListener('input', handleInput);

  for (var t = 0; t < tabBtns.length; t++){
    (function(btn){
      btn.addEventListener('click', function(){
        switchTo(parseInt(btn.getAttribute('data-i'), 10));
      });
    })(tabBtns[t]);
  }

  function copyText(){
    var value = ta.value;
    function done(){
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('done');
      setTimeout(function(){
        copyBtn.textContent = 'Copy';
        copyBtn.classList.remove('done');
      }, 1400);
    }
    function fallback(){
      ta.focus();
      ta.setSelectionRange(0, ta.value.length);
      try { document.execCommand('copy'); } catch(e){}
      ta.setSelectionRange(ta.value.length, ta.value.length);
      done();
    }
    if (navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(value).then(done).catch(fallback);
    } else {
      fallback();
    }
  }

  copyBtn.addEventListener('click', copyText);

  var overlay = document.getElementById('overlay');
  var yesBtn = document.getElementById('yes');
  var noBtn = document.getElementById('no');

  clearBtn.addEventListener('click', function(){
    if (ta.value.length === 0){ ta.focus(); return; }
    overlay.classList.add('show');
  });
  function closeDialog(){ overlay.classList.remove('show'); }
  noBtn.addEventListener('click', function(){ closeDialog(); ta.focus(); });
  yesBtn.addEventListener('click', function(){
    ta.value = '';
    lastState = '';
    update();
    lastInputLength = 0;
    closeDialog();
    ta.focus();
  });
  overlay.addEventListener('click', function(e){
    if (e.target === overlay) closeDialog();
  });

  update();
  lastInputLength = ta.value.length;
</script>

<script>
(function(){
  const ta=document.getElementById('text');
  if(!ta) return;

  function createSnow(){
    const s=document.createElement('div');
    s.className='snowflake';
    s.textContent='❄';

    s.style.left=(Math.random()*100)+'vw';
    s.style.fontSize=(16+Math.random()*16)+'px'; /* 눈송이 2배 */
    s.style.setProperty('--drift',(Math.random()*60-30)+'px');
    s.style.animationDuration=(7+Math.random()*5)+'s';

    document.body.appendChild(s);
    setTimeout(()=>s.remove(),13000);
  }

  let lastLen=0;

  ta.addEventListener('input',()=>{
    const diff=Math.max(0, ta.value.length-lastLen);
    lastLen=ta.value.length;

    if(diff===0) return;

    /* 글자를 가리지 않도록 적은 수만 생성 */
    const count=Math.min(6, diff * 2);

    for(let i=0;i<count;i++){
      setTimeout(createSnow,i*120);
    }
  });
})();
</script>
